AWSTemplateFormatVersion: "2010-09-09"
Description: Base infra for 5GC model on ECS/EC2 (VPC, ALB, ECS cluster, ASG, IAM, logs)

Parameters:
  VpcCidr: { Type: String, Default: 10.0.0.0/16 }
  PublicSubnet1Cidr: { Type: String, Default: 10.0.1.0/24 }
  PublicSubnet2Cidr: { Type: String, Default: 10.0.2.0/24 }
  PrivateSubnet1Cidr: { Type: String, Default: 10.0.3.0/24 }
  PrivateSubnet2Cidr: { Type: String, Default: 10.0.4.0/24 }
  InstanceType: { Type: String, Default: t3.small, AllowedValues: [t3.micro, t3.small] }
  KeyName:
    Type: String
    Default: ""
    Description: Optional, leave empty (we use SSM, no SSH)

  ECSAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ecs/optimized-ami/amazon-linux-2/recommended/image_id
    Description: Latest ECS-optimized Amazon Linux 2 AMI ID from SSM Parameter Store

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true

  IGW:
    Type: AWS::EC2::InternetGateway

  IGWAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref IGW

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [1, !GetAZs ""]

  PublicRT:
    Type: AWS::EC2::RouteTable
    Properties: { VpcId: !Ref VPC }

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttach
    Properties:
      RouteTableId: !Ref PublicRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGW

  Assoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnet1, RouteTableId: !Ref PublicRT }

  Assoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnet2, RouteTableId: !Ref PublicRT }

  # Private subnets for UPF (N6 / user plane); outbound via NAT Gateway
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttach
    Properties: { Domain: vpc }

  NatGateway:
    Type: AWS::EC2::NatGateway
    DependsOn: NatEip
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1

  PrivateRT:
    Type: AWS::EC2::RouteTable
    Properties: { VpcId: !Ref VPC }

  PrivateRoute:
    Type: AWS::EC2::Route
    DependsOn: NatGateway
    Properties:
      RouteTableId: !Ref PrivateRT
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnet1, RouteTableId: !Ref PrivateRT }

  PrivateAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnet2, RouteTableId: !Ref PrivateRT }

  # VPC Flow Logs → CloudWatch (for interactive Attack 3: see UPF traffic to internet)
  FlowLogsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties: { LogGroupName: !Sub "/vpc/${AWS::StackName}/flowlogs", RetentionInDays: 7 }

  FlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: vpc-flow-logs.amazonaws.com }
            Action: sts:AssumeRole

  FlowLogsPolicy:
    Type: AWS::IAM::Policy
    DependsOn: FlowLogsLogGroup
    Properties:
      PolicyName: FlowLogsToCloudWatch
      Roles: [!Ref FlowLogsRole]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: [ logs:CreateLogStream, logs:PutLogEvents, logs:DescribeLogGroups, logs:DescribeLogStreams ]
            Resource: [ !GetAtt FlowLogsLogGroup.Arn, !Sub "${FlowLogsLogGroup.Arn}:*" ]

  FlowLog:
    Type: AWS::EC2::FlowLog
    DependsOn: FlowLogsPolicy
    Properties:
      ResourceType: VPC
      ResourceId: !Ref VPC
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref FlowLogsLogGroup
      DeliverLogsPermissionArn: !GetAtt FlowLogsRole.Arn

  AlbSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB ingress
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ECSInstanceSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS instances - allow only from ALB and internal
      VpcId: !Ref VPC

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Subnets: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      SecurityGroups: [!Ref AlbSG]

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "404"
            ContentType: text/plain
            MessageBody: "No route"

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: core-ecs-ec2

  # IAM role for ECS container instances: ECS agent + ECR pull + CW logs + SSM
  ECSInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  ECSInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref ECSInstanceRole]

  # Latest ECS Optimised AL2 AMI

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref ECSAMI
        InstanceType: !Ref InstanceType
        IamInstanceProfile: { Arn: !GetAtt ECSInstanceProfile.Arn }
        SecurityGroupIds: [!Ref ECSInstanceSG]
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            echo ECS_CLUSTER=${ECSCluster} >> /etc/ecs/ecs.config

  ASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      MinSize: "1"
      MaxSize: "3"
      DesiredCapacity: "3"
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber

Outputs:
  VpcId: { Value: !Ref VPC }
  PublicSubnet1: { Value: !Ref PublicSubnet1 }
  PublicSubnet2: { Value: !Ref PublicSubnet2 }
  PrivateSubnet1: { Value: !Ref PrivateSubnet1 }
  PrivateSubnet2: { Value: !Ref PrivateSubnet2 }
  AlbArn: { Value: !Ref ALB }
  AlbDNS: { Value: !GetAtt ALB.DNSName }
  AlbListenerArn: { Value: !Ref AlbListener }
  EcsClusterName: { Value: !Ref ECSCluster }
  AlbSG: { Value: !Ref AlbSG }
  ECSInstanceSG: { Value: !Ref ECSInstanceSG }
  FlowLogsLogGroupName: { Value: !Ref FlowLogsLogGroup }
  FlowLogsLogGroupArn: { Value: !GetAtt FlowLogsLogGroup.Arn }
